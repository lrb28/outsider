# Data-driven tracked-entity list (NOT hardcoded in logic).
# The ingestion pipelines read this file; add a row to track a new actor.
#
# For politicians the House/Senate bulk feeds are ingested wholesale anyway —
# entries here just mark who to HIGHLIGHT (e.g. Pelosi) in the UI.

institutions:
